kind = "web"
previewPath = "/"
title = "Election Guide"
version = "1.0.0"
id = "artifacts/election-guide"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20975

[services.development]
run = "pnpm --filter @workspace/election-guide run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/election-guide", "run", "build" ]
publicDir = "artifacts/election-guide/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20975"
BASE_PATH = "/"
